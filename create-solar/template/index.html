<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{PROJECT_NAME}}</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --solar: #f59e0b;
      --solar-dim: #b45309;
      --solar-glow: rgba(245, 158, 11, 0.25);
      --star-color: rgba(255, 255, 255, 0.6);
      --text: #f0ede8;
      --text-dim: #6b6860;
      --surface: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.08);
    }

    html, body {
      height: 100%;
      background: #09080a;
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      overflow-x: hidden;
    }

    /* Stars */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .star {
      position: absolute;
      border-radius: 50%;
      background: var(--star-color);
      animation: twinkle var(--d, 4s) ease-in-out infinite alternate;
    }
    @keyframes twinkle {
      from { opacity: var(--o1, 0.2); transform: scale(1); }
      to   { opacity: var(--o2, 0.8); transform: scale(1.4); }
    }

    /* Orb */
    .orb {
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 40%, #f59e0b 0%, #92400e 40%, transparent 70%);
      opacity: 0.12;
      filter: blur(60px);
      pointer-events: none;
      z-index: 0;
    }

    /* Layout */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4rem 2rem 6rem;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 5rem;
      align-self: flex-start;
    }
    .logo-mark {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fff8e1 0%, var(--solar) 50%, #78350f 100%);
      box-shadow: 0 0 12px var(--solar-glow);
      flex-shrink: 0;
    }
    .logo-text {
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    /* Hero */
    .hero {
      text-align: center;
      max-width: 640px;
      margin-bottom: 4rem;
    }
    .orbit-ring {
      width: 80px;
      height: 80px;
      margin: 0 auto 2rem;
      position: relative;
    }
    .orbit-ring::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1.5px solid rgba(245, 158, 11, 0.35);
      animation: spin 8s linear infinite;
    }
    .orbit-ring::after {
      content: '';
      position: absolute;
      top: -1px;
      left: 50%;
      width: 6px;
      height: 6px;
      margin-left: -3px;
      border-radius: 50%;
      background: var(--solar);
      box-shadow: 0 0 8px var(--solar);
      animation: spin 8s linear infinite;
    }
    .orbit-core {
      position: absolute;
      inset: 20px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fff8e1 0%, var(--solar) 55%, #78350f 100%);
      box-shadow: 0 0 20px var(--solar-glow);
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .hero h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #fff8e1 0%, #f59e0b 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero p {
      font-size: 1rem;
      color: var(--text-dim);
      line-height: 1.6;
      max-width: 420px;
      margin: 0 auto;
    }

    /* App mount */
    #app {
      width: 100%;
      max-width: 440px;
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      backdrop-filter: blur(12px);
    }
    .card__label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 1.5rem;
    }
    .card__count {
      font-size: 4rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1;
      margin-bottom: 1.5rem;
      font-variant-numeric: tabular-nums;
      background: linear-gradient(135deg, #fff8e1 0%, #f59e0b 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .card__controls {
      display: flex;
      gap: 0.5rem;
    }

    /* Buttons */
    .btn {
      padding: 0.6rem 1.25rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.96); }
    .btn:hover { opacity: 0.85; }
    .btn--primary {
      background: var(--solar);
      color: #1a0f00;
      box-shadow: 0 0 16px var(--solar-glow);
    }
    .btn--secondary {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }

    /* Footer */
    footer {
      margin-top: 5rem;
      font-size: 0.75rem;
      color: var(--text-dim);
      text-align: center;
      line-height: 2;
    }
    footer code {
      font-family: ui-monospace, monospace;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 0.15em 0.5em;
      border-radius: 4px;
      color: #f59e0b;
    }
  </style>
</head>
<body>
  <canvas class="stars" id="stars"></canvas>
  <div class="orb"></div>

  <div class="page">
    <header>
      <div class="logo-mark"></div>
      <span class="logo-text">Solar</span>
    </header>

    <section class="hero">
      <div class="orbit-ring">
        <div class="orbit-core"></div>
      </div>
      <h1>{{PROJECT_NAME}}</h1>
      <p>A Solar project. Runtime-based, contract-driven, built for the age of AI-generated code.</p>
    </section>

    <div id="app"></div>

    <footer>
      Edit <code>components/App.js</code> to get started.<br>
      Powered by <code>Solar</code> — the runtime framework for AI-generated code.
    </footer>
  </div>

  <script>
    const canvas = document.getElementById('stars')
    const ctx = canvas.getContext('2d')
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight }
    resize()
    window.addEventListener('resize', resize)
    for (let i = 0; i < 160; i++) {
      const x = Math.random() * canvas.width
      const y = Math.random() * canvas.height
      const r = Math.random() * 1.2 + 0.2
      const a = Math.random() * 0.7 + 0.1
      ctx.beginPath()
      ctx.arc(x, y, r, 0, Math.PI * 2)
      ctx.fillStyle = `rgba(255,255,255,${a})`
      ctx.fill()
    }
  </script>
  <script type="module" src="./main.js"></script>
</body>
</html>
