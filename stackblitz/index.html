<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solar: Live Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0 }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #09080a;
      color: #e8e6ea;
      min-height: 100vh;
      padding: 2rem;
    }

    .demo {
      max-width: 520px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #6b6573;
      margin-bottom: 0.75rem;
    }

    /* Button */
    .btn {
      display: inline-flex;
      align-items: center;
      padding: 0.5rem 1.25rem;
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85 }
    .btn--primary   { background: #f59e0b; color: #09080a; }
    .btn--secondary { background: #1e1b22; color: #e8e6ea; border: 1px solid #2e2a34; }

    /* Error card */
    .error-card {
      background: #141218;
      border: 1px solid #2e2a34;
      border-radius: 8px;
      overflow: hidden;
    }

    .error-card__header {
      padding: 0.625rem 1rem;
      background: #1a1720;
      border-bottom: 1px solid #2e2a34;
      display: flex;
      align-items: center;
      gap: 0.625rem;
    }

    .error-badge {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      background: #450a0a;
      color: #fca5a5;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
    }

    .error-card__title {
      font-size: 0.8rem;
      color: #6b6573;
    }

    .error-card__body {
      padding: 1rem;
      font-family: 'SF Mono', 'Fira Code', 'Fira Mono', monospace;
      font-size: 0.775rem;
      line-height: 1.7;
      color: #9d98a8;
    }

    .key   { color: #c084fc; }
    .value { color: #e8e6ea; }
    .fix   { color: #86efac; }
  </style>
</head>
<body>
  <div class="demo">
    <div>
      <p class="label">Component — correct props</p>
      <div id="working"></div>
    </div>
    <div>
      <p class="label">Component — wrong prop type</p>
      <div id="error"></div>
    </div>
  </div>
  <script type="module" src="./main.js"></script>
</body>
</html>
