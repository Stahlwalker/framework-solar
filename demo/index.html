<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Starlord Framework Demo</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 2rem; background: #0f0f0f; color: #e0e0e0; }
    h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 2rem; color: #fff; }
    h2 { font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.1em; color: #666; margin: 2rem 0 1rem; }

    .demo-section { border: 1px solid #222; border-radius: 8px; padding: 1.5rem; margin-bottom: 1.5rem; }

    .counter { display: flex; align-items: center; gap: 1rem; }
    .counter__value { margin: 0; font-size: 1.5rem; font-weight: 600; min-width: 8ch; }
    .counter__controls { display: flex; gap: 0.5rem; }

    .btn { padding: 0.5rem 1rem; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; font-weight: 500; transition: opacity 0.1s; }
    .btn:hover { opacity: 0.85; }
    .btn--primary { background: #5b5ef7; color: #fff; }
    .btn--secondary { background: #2a2a2a; color: #e0e0e0; border: 1px solid #444; }

    #error-demo { margin-top: 1rem; }
    #error-output { background: #1a0a0a; border: 1px solid #5a1a1a; color: #ff6b6b; border-radius: 6px; padding: 1rem; font-family: monospace; font-size: 0.8rem; white-space: pre; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <h1>Starlord — Runtime Framework Demo</h1>

  <h2>Phase 1–3: Counter (hooks + diffing)</h2>
  <div class="demo-section" id="counter-root"></div>

  <h2>Phase 4: Contract validation</h2>
  <div class="demo-section">
    <p style="margin:0 0 0.75rem;font-size:0.875rem;color:#aaa;">Passing a number where string is required:</p>
    <div id="error-output"></div>
  </div>

  <h2>Phase 5–6: Fetch effect + batched updates</h2>
  <div class="demo-section" id="effect-root"></div>

  <script type="module" src="./main.js"></script>
</body>
</html>
